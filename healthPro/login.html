<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthPro – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #faf9f7; --surface: #f3f0eb; --border: #e5e0d8;
      --text: #1a1815; --muted: #6b6560; --subtle: #9a948c;
      --accent: #2d6a4f; --accent-light: #d8f3dc; --error: #c0392b;
    }
    body { font-family: 'Geist', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

    .back-link { position: fixed; top: 22px; left: 22px; display: flex; align-items: center; gap: 7px; text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 500; background: var(--bg); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; transition: all 0.2s; }
    .back-link:hover { background: var(--surface); color: var(--text); }

    .login-container { width: 100%; max-width: 400px; }
    .login-card { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 44px 36px; }

    .login-header { text-align: center; margin-bottom: 36px; }
    .header-icon { width: 56px; height: 56px; margin: 0 auto 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .login-header h2 { font-family: 'Instrument Serif', serif; font-size: 1.8rem; font-weight: 400; color: var(--text); margin-bottom: 6px; }
    .login-header p { color: var(--subtle); font-size: 14px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.05em; }
    .input-wrap { position: relative; }
    .input-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px 11px 40px; color: var(--text); font-size: 14px; font-family: 'Geist', sans-serif; outline: none; transition: border-color 0.2s; }
    .input-wrap input:focus { border-color: var(--accent); background: var(--bg); }
    .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--subtle); font-size: 15px; pointer-events: none; }
    .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--subtle); font-size: 13px; padding: 2px; }
    .pw-toggle:hover { color: var(--muted); }
    .form-group.error input { border-color: var(--error); }
    .error-msg { color: var(--error); font-size: 12px; margin-top: 5px; display: none; }
    .form-group.error .error-msg { display: block; }

    .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .remember-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--muted); }
    .remember-label input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }
    .forgot-link { font-size: 13px; color: var(--muted); text-decoration: none; }
    .forgot-link:hover { color: var(--text); }

    .submit-btn { width: 100%; background: var(--text); border: none; border-radius: 8px; padding: 13px; color: var(--bg); font-size: 14px; font-weight: 500; font-family: 'Geist', sans-serif; cursor: pointer; transition: background 0.2s; margin-bottom: 24px; position: relative; }
    .submit-btn:hover { background: #2e2b27; }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-text { transition: opacity 0.2s; }
    .btn-spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); display: none; }
    .submit-btn.loading .btn-text { opacity: 0; }
    .submit-btn.loading .btn-spinner { display: block; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { display: flex; align-items: center; gap: 12px; margin: 4px 0 20px; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 12px; color: var(--subtle); }

    .social-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
    .social-btn { width: 48px; height: 44px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
    .social-btn:hover { border-color: var(--muted); }
    .social-btn svg { width: 20px; height: 20px; }

    .bottom-link { text-align: center; font-size: 13px; color: var(--subtle); }
    .bottom-link a { color: var(--muted); font-weight: 500; text-decoration: none; }
    .bottom-link a:hover { color: var(--text); }

    .success-state { display: none; text-align: center; padding: 24px 0; }
    .success-state h3 { font-family: 'Instrument Serif', serif; font-size: 1.4rem; color: var(--text); margin: 12px 0 6px; }
    .success-state p { font-size: 13px; color: var(--subtle); }

    @media (max-width: 480px) { .login-card { padding: 32px 22px; } .back-link span { display: none; } }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← <span>Back to Home</span></a>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="header-icon">👤</div>
        <h2>Welcome back</h2>
        <p>Sign in to continue to HealthPro</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group" id="emailGroup">
          <label>Email address</label>
          <div class="input-wrap">
            <span class="input-icon">✉</span>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="error-msg" id="emailError"></div>
        </div>

        <div class="form-group" id="passwordGroup">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
            <button type="button" class="pw-toggle" id="pwToggle">Show</button>
          </div>
          <div class="error-msg" id="passwordError"></div>
        </div>

        <div class="form-options">
          <label class="remember-label">
            <input type="checkbox" name="remember"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner"><div class="spinner"></div></span>
        </button>
      </form>

      <div class="divider"><div class="divider-line"></div><span>or continue with</span><div class="divider-line"></div></div>

      <div class="social-row">
        <button class="social-btn" title="Google">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        </button>
        <button class="social-btn" title="GitHub">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </button>
        <button class="social-btn" title="Twitter">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
        </button>
      </div>

      <div class="bottom-link"><p>Don't have an account? <a href="signup.html">Sign up</a></p></div>

      <div class="success-state" id="successState">
        <div style="font-size:36px">✅</div>
        <h3>Welcome back!</h3>
        <p>Redirecting to your dashboard…</p>
      </div>
    </div>
  </div>

  <script>
    const toggle = document.getElementById('pwToggle');
    const pw = document.getElementById('password');
    toggle.addEventListener('click', () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      toggle.textContent = show ? 'Hide' : 'Show';
    });

    function setError(groupId, errId, msg) {
      document.getElementById(groupId).classList.add('error');
      const err = document.getElementById(errId);
      err.textContent = msg;
    }
    function clearError(groupId) { document.getElementById(groupId).classList.remove('error'); }

    document.getElementById('email').addEventListener('input', () => clearError('emailGroup'));
    document.getElementById('password').addEventListener('input', () => clearError('passwordGroup'));

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      let valid = true;
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      clearError('emailGroup'); clearError('passwordGroup');
      if (!email) { setError('emailGroup','emailError','Email is required'); valid = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('emailGroup','emailError','Please enter a valid email'); valid = false; }
      if (!pass) { setError('passwordGroup','passwordError','Password is required'); valid = false; }
      else if (pass.length < 6) { setError('passwordGroup','passwordError','Password must be at least 6 characters'); valid = false; }
      if (!valid) return;
      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading'); btn.disabled = true;
      await new Promise(r => setTimeout(r, 1800));
      btn.classList.remove('loading');
      document.getElementById('loginForm').style.display = 'none';
      document.querySelector('.divider').style.display = 'none';
      document.querySelector('.social-row').style.display = 'none';
      document.querySelector('.bottom-link').style.display = 'none';
      document.getElementById('successState').style.display = 'block';
      setTimeout(() => window.location.href = 'dashboard.html', 2200);
    });
  </script>
</body>
</html>
